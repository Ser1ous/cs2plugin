// ============================================================
// AIM map configuration
// Applied when no match is active and server is in AIM mode
// ============================================================

// Keep server awake so first connection never hits a hibernating server
sv_hibernate_when_empty 0

// Round settings
mp_roundtime 5
mp_roundtime_defuse 5
mp_roundtime_hostage 5
mp_freezetime 3

// Economy — full buy for everyone
mp_startmoney 16000
mp_buytime 9999
mp_buy_anywhere 1

// Team settings
mp_autoteambalance 1
mp_limitteams 1
mp_teammates_are_enemies 0
mp_friendlyfire 0

// Max rounds (long session)
mp_maxrounds 0
mp_halftime 0

// Weapons
mp_give_player_c4 0

// No overtime needed
mp_overtime_enable 0

// Short warmup so late joiners can buy before first round
mp_warmuptime 30
mp_warmup_pausetimer 0

// Allow joining during the match
mp_join_grace_time 30
mp_limitteams 0
sv_deadtalk 1

// No C4 on aim maps
mp_give_player_c4 0

// Bots optional — kick them for aim maps
bot_kick

// Respawn (if supported by map)
mp_respawn_on_death_ct 1
mp_respawn_on_death_t 1

// Death messages
mp_death_camera_freeze 0
