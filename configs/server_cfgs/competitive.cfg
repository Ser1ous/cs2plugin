// ============================================================
// Premier / Competitive match configuration
// game_type 0, game_mode 1 = Classic Competitive (Premier-style)
// ============================================================

// Game mode — must be set before everything else
game_type 0
game_mode 1

// Round settings
mp_maxrounds 24
mp_halftime 1
mp_freezetime 15
mp_roundtime 1.92
mp_roundtime_defuse 1.92
mp_roundtime_hostage 3.25

// Economy
mp_startmoney 800
mp_buytime 20
mp_buy_anywhere 0
mp_free_armor 0

// Weapons
mp_give_player_c4 1
mp_t_default_secondary "weapon_glock"
mp_ct_default_secondary "weapon_hkp2000"
mp_t_default_primary ""
mp_ct_default_primary ""

// Team settings
mp_autoteambalance 0
mp_limitteams 0
mp_teammates_are_enemies 0
mp_solid_teammates 1

// Friendly fire — on (Premier style)
mp_friendlyfire 1
ff_damage_reduction_other 0.33
ff_damage_reduction_grenade 0.85
ff_damage_reduction_bullets 0.33

// Overtime — MR6, $12500 start (Premier OT rules)
mp_overtime_enable 1
mp_overtime_maxrounds 6
mp_overtime_startmoney 12500
mp_overtime_halftime_pausetimer 0

// Warmup — off when going live
mp_warmuptime 0
mp_warmup_pausetimer 0

// No bots
bot_kick
bot_quota 0
bot_join_after_player 0

// Death cam (Premier style — short freeze, no extended panel)
mp_death_camera_freeze 0
spec_freeze_time 2
spec_freeze_panel_extended_time 0

// Knife drop allowed
mp_drop_knife_enable 1

// Premier rating style colors for teams
// CT = blue, T = yellow (default CS2 colors, set via ConVar)
mp_ct_default_primary ""
mp_t_default_primary ""

// Damage indicators
sv_show_team_equipment 0

// Anti-cheat
sv_cheats 0

// Match logging
log on
mp_logdetail 3
mp_logmoney 1
mp_logfile 1

// Win conditions — do not end match on reaching win limit mid-plugin management
mp_match_end_changelevel 0

// HUD colors (Premier uses these)
mp_win_panel_display_time 3

sv_competitive_official_5v5 1
