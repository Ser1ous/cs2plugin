// ============================================================
// Warmup configuration
// Applied before knife round / match start
// ============================================================

// Keep server awake
sv_hibernate_when_empty 0

// Warmup settings
mp_warmuptime 9999
mp_warmup_pausetimer 1
mp_freezetime 0

// Team settings
mp_autoteambalance 0
mp_limitteams 0
mp_teammates_are_enemies 0

// Economy
mp_startmoney 16000
mp_buy_anywhere 1
mp_buytime 9999

// Round settings
mp_roundtime 60
mp_roundtime_defuse 60
mp_roundtime_hostage 60

// No friendly fire in warmup
mp_friendlyfire 0

// Kick bots
bot_kick

// Allow join any team
mp_join_grace_time 15
